<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
			integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk="
			crossorigin="anonymous"
		/>
		<link rel="stylesheet" href="css/indexStyle.css" />
		<title>COE Messaging App</title>
		<link rel="icon" href="https://lh3.googleusercontent.com/pw/ACtC-3eOodNS4-awUVy4mwQlpp3SFQwP8vV6dacl4GKvCl-MR6tOrVpBa5BNvpPeCvRwnq0yo-M0By4Eru6f1dQr4jBDehRVNiPwkUQn3I3qiEA2eII7vhM95QENm1-R1UMtu3rlgdcr0dTSi3nWjcsrE1k9=w480-h512-no?authuser=1" type="image/x-icon">
	</head>
	<body class="join-page">
		<div class="join-container">
			<header class="join-header">
				<h1 class="glow">
					<i class="fas fa-dice-d20" aria-hidden="true"></i>
					COE
					<span class="tagline">Chat Online for Engineers</span>
				</h1>
			</header>
			<main class="join-main">
				<form action="chat.html" id="join-form">
					<div class="form-control">
						<label for="username">Username</label>
						<input
							type="text"
							name="username"
							id="username"
							placeholder="Enter your username..."
							autocomplete="off"
							autofocus
							required
							maxlength="30"
							pattern="[a-zA-Z0-9_\-\s.]+"
							title="Letters, numbers, spaces, dots, hyphens, underscores only"
						/>
					</div>
					<div class="form-control">
						<label for="room">Room</label>
						<select name="room" id="room" required>
							<option value="" selected disabled hidden>Choose a room to join</option>
							<option value="COE" data-room="COE">COE</option>
							<option value="IT" data-room="IT">IT</option>
							<option value="MAC" data-room="MAC">MAC</option>
							<option value="ECE" data-room="ECE">ECE</option>
							<option value="MECH" data-room="MECH">MECH</option>
							<option value="ICE" data-room="ICE">ICE</option>
							<option value="default">&#128397; Create a room</option>
						</select>
					</div>
					<p id="join-error" class="join-error hidden"></p>
					<button type="submit" class="btn">
						Join Chat
						<i class="fas fa-arrow-right" aria-hidden="true"></i>
					</button>
				</form>
			</main>
		</div>
		<script src="/socket.io/socket.io.js"></script>
		<script src="js/index.js"></script>
	</body>
</html>
