<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css"
      integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>COE Messaging App</title>
    <link rel="icon" href="https://lh3.googleusercontent.com/pw/ACtC-3eOodNS4-awUVy4mwQlpp3SFQwP8vV6dacl4GKvCl-MR6tOrVpBa5BNvpPeCvRwnq0yo-M0By4Eru6f1dQr4jBDehRVNiPwkUQn3I3qiEA2eII7vhM95QENm1-R1UMtu3rlgdcr0dTSi3nWjcsrE1k9=w480-h512-no?authuser=1" type="image/icon type">
  </head>
  <body class="chat-page">
    <div id="connection-banner" class="connection-banner hidden" role="status"></div>

    <div class="chat-container">
      <header class="chat-header">
        <div class="chat-header-left">
          <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="glow"><i class="fas fa-dice-d20"></i><em> COE :<span style="font-weight: 500; font-size: 0.5em;"> Chat Online for Engineers</span></em></h1>
        </div>
        <div class="chat-header-right">
          <button type="button" id="mute-toggle" class="btn-icon" aria-label="Toggle sound" title="Toggle sound">
            <i class="fas fa-volume-up"></i>
          </button>
          <a href="index.html" id="leave-room" class="btn leave-room">Leave Room <i class="fas fa-sign-out-alt"></i></a>
        </div>
      </header>
      <main class="chat-main">
        <div class="chat-sidebar" id="chat-sidebar">
          <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">
            <i class="fas fa-times"></i>
          </button>
          <h3><i class="fas fa-comments"></i> Current Room:</h3>
          <h2 id="room-name"></h2>
          <h3><i class="fas fa-users"></i> Active Users:</h3>
          <ul id="users"></ul>
        </div>
        <div class="chat-panel">
          <div class="chat-messages"></div>
          <div id="typing-indicator" class="typing-indicator hidden"></div>
          <button type="button" id="scroll-bottom" class="scroll-bottom hidden" aria-label="Scroll to latest messages">
            <i class="fas fa-chevron-down"></i>
            <span id="unread-badge" class="unread-badge hidden">0</span>
          </button>
        </div>
      </main>
      <div class="chat-form-container">
        <form id="chat-form">
          <input
            id="msg"
            type="text"
            placeholder="Start typing ..."
            maxlength="500"
            required
            autocomplete="off"
            autofocus
          />
          <button type="submit" class="btn send-btn" aria-label="Send message">✈</button>
        </form>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.9.2/qs.min.js"
      integrity="sha256-TDxXjkAUay70ae/QJBEpGKkpVslXaHHayklIVglFRT4="
      crossorigin="anonymous"
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
